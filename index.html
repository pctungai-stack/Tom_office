<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tôm's Office Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-4">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8">
            <h1 class="text-2xl font-bold text-emerald-400">🦐 Tôm's Office Dashboard</h1>
            <p class="text-slate-400">Văn phòng số của đại ca đã lên mây!</p>
        </header>
        <div class="glass p-6 rounded-xl">
            <p>Văn phòng đã sẵn sàng kết nối. Tôm đang đợi kết nối dữ liệu từ máy tính của đại ca lên đây...</p>
        </div>
    </div>
</body>
</html>
